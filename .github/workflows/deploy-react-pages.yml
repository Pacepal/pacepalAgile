name: Deploy React Sprint 3 to GitHub Pages

on:
  push:
    branches:
      - sprint-3-react-jsx
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build React Sprint 3
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend-react/package-lock.json

      - name: Install dependencies
        working-directory: frontend-react
        run: npm ci

      - name: Build React app
        working-directory: frontend-react
        run: npm run build

      - name: Ensure GitHub Pages entry point
        working-directory: frontend-react
        shell: bash
        run: |
          if [ ! -f dist/index.html ] && [ -f dist/pacepal-react.html ]; then
            cp dist/pacepal-react.html dist/index.html
          fi

      - name: Copy public images
        shell: bash
        run: |
          mkdir -p frontend-react/dist/img
          cp -r img/* frontend-react/dist/img/

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend-react/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy artifact
        id: deployment
        uses: actions/deploy-pages@v4
